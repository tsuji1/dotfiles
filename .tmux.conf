set -g default-terminal "tmux-256color"

set -g history-limit 200000
set -g mouse on
setw -g mode-keys vi
bind -n WheelUpPane   if-shell -F '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'
bind -n WheelDownPane if-shell -F '#{pane_in_mode}' 'send-keys -M' 'send-keys -M'
# （必要なら）alt screen を弱めたい場合：
# set -ga terminal-overrides ',xterm*:smcup@:rmcup@'

# # 配色（緑やめる＋落ち着いたテーマ）
set -g status on
set -g status-style "bg=default,fg=colour245"
set -g window-status-style "bg=default,fg=colour244"
set -g window-status-current-style "bg=default,fg=colour223"
set -g pane-border-style "fg=colour237"
set -g pane-active-border-style "fg=colour109"
set -g message-style "bg=colour236,fg=colour223"
#
# # ステータス表示をシンプルに
set -g status-left  "#[bold]#S "
set -g status-right "#[fg=colour109]%H:%M #[fg=colour244]%d-%b"


# --- Dracula テーマ ---
set -g status on
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'

# 表示するプラグイン（お好みで）
set -g @dracula-plugins "git time"
set -g @dracula-refresh-rate 5

run -b '~/.tmux/plugins/tpm/tpm'


set-window-option -g mode-keys vi

set -s set-clipboard on
set -g allow-passthrough on
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# copy-mode-vi でも動くように（tmuxのコピーモード中）
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l



# === Split panes (keep same cwd) ===
unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# === Move between panes (vim-like) ===
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# === Resize panes (repeatable) ===
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# === Handy extras ===
bind z resize-pane -Z          # zoom toggle
bind x kill-pane               # close pane (confirm)
bind Space next-layout         # cycle layouts
bind r rotate-window           # rotate panes
bind c new-window -c "#{pane_current_path}"  # new window same cwd

# reload config quickly
bind R source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
